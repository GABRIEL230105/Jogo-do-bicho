name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Backend
        run: |
          cd backend
          yarn
          yarn test

      - name: Frontend
        run: |
          cd frontend
          yarn
          yarn build